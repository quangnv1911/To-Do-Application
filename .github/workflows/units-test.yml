name: Unit Tests Reusable Workflow

on:
  workflow_call:
    inputs:
      backend_dir:
        required: true
        type: string

jobs:
  backend-unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: maven

      - name: Run Java Spring Unit Tests
        run: |
          cd ${{ inputs.backend_dir }}
          mvn test
