name: Docker Build and Push Reusable Workflow

on:
  workflow_call:
    inputs:
      image-name:
        description: 'The name of the Docker image to build and push'
        required: true
        type: string
        default: quangnv1911/to-do-app-fe
      registry:
        description: 'The registry to push the Docker image to'
        required: true
        type: string
        default: docker.io
      dockerfile-path:
        description: 'The path to the Dockerfile to build the image from'
        required: true
        type: string
        default: ./Dockerfile
      context:
        description: 'The context to use for the Docker build'
        required: true
        type: string
        default: .
      is-main-branch:
        description: 'Whether this workflow is running for the main branch'
        required: false
        type: boolean
        default: false
      additional-tags:
        description: 'Additional tags to apply (comma-separated)'
        required: false
        type: string
        default: ''
      custom-tags:
        description: 'Custom tag configuration in YAML format'
        required: false
        type: string
        default: ''
      deploy-to-server:
        description: 'Whether to deploy to server after pushing to Docker Hub'
        required: false
        type: boolean
        default: true
    secrets:
      DOCKER_USERNAME:
        description: 'Docker Hub username'
        required: true
      DOCKER_PASSWORD:
        description: 'Docker Hub password'
        required: true
      SSH_PRIVATE_KEY_DEV:
        description: 'SSH private key for development server'
        required: false
      SSH_PRIVATE_KEY_MAIN:
        description: 'SSH private key for production server'
        required: false
      DEV_SERVER_HOST:
        description: 'Development server hostname or IP'
        required: false
      MAIN_SERVER_HOST:
        description: 'Production server hostname or IP'
        required: false
      SERVER_USER:
        description: 'SSH username for server access'
        required: false
      DOCKER_COMPOSE_PATH:
        description: 'Path to docker-compose.yml on the server'
        required: false
    outputs:
      image-tag:
        description: "Tag of docker image created"
        value: ${{ jobs.push_to_registry.outputs.image-tag }}

jobs:
  metadata:
    uses: ./.github/workflows/docker-metadata.yml
    with:
      image-name: ${{ inputs.image-name }}
      is-main-branch: ${{ inputs.is-main-branch }}
      additional-tags: ${{ inputs.additional-tags }}
      custom-tags: ${{ inputs.custom-tags }}

  push_to_registry:
    name: Push Docker image to Docker Hub
    runs-on: ubuntu-latest
    needs: metadata
    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    outputs:
      image-tag: ${{ needs.metadata.outputs.tags }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile-path }}
          push: true
          tags: ${{ needs.metadata.outputs.tags }}
          labels: ${{ needs.metadata.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ inputs.registry }}/${{ inputs.image-name }}:${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ inputs.registry }}/${{ inputs.image-name }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache
